<!DOCTYPE html>
<html>

<head>

    <title>Contact Us</title>

    <link rel="stylesheet" href="assets/css/style.css">

    <link
        rel="stylesheet"
        href="assets/css/style.css"
    >

    <link
        href="https://unpkg.com/aos@2.3.4/dist/aos.css"
        rel="stylesheet"
    >

</head>

<body class="bg-slate-100">

    <nav
        id="navbar"
        class="fixed top-0 left-0 w-full z-50 transition-all duration-300 bg-slate-100"
    >

        <div class="max-w-7xl mx-auto px-6">

            <div class="flex justify-between items-center h-20">

                <!-- Logo -->
                <a
                    href="home.html"
                    class="text-3xl font-bold logoText"
                >
                    CASA TEJADA
                </a>

                <!-- Desktop Menu -->
                <div class="hidden md:flex items-center gap-8">

                    <a href="home.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="gallery.html">Gallery</a>
                    <a href="contact.html">Contact</a>
                    <a href="booking.html">Book Now</a>
                    <a href="track.html">Track Booking</a>
                    <a href="available_dates.html">Availability</a>

                </div>

                <!-- Mobile Button -->
                <button
                    id="menuBtn"
                    class="md:hidden text-3xl"
                >
                    ☰
                </button>

                <!-- Book Button -->
                <a
                    href="booking.html"
                    class="hidden md:block bg-amber-500 hover:bg-amber-600 text-white px-6 py-3 rounded-2xl"
                >
                    Book Now
                </a>

            </div>

            <!-- Mobile Menu -->
            <div
                id="mobileMenu"
                class="hidden md:hidden bg-white rounded-xl shadow-lg p-4 space-y-4 absolute top-20 left-0 w-full z-50"
            >

                <a href="home.html" class="block">Home</a>
                <a href="about.html" class="block">About</a>
                <a href="gallery.html" class="block">Gallery</a>
                <a href="contact.html" class="block">Contact</a>
                <a href="booking.html" class="block">Book Now</a>
                <a href="track.html" class="block">Track Booking</a>
                <a href="available_dates.html" class="block">Availability</a>

            </div>

        </div>

    </nav>

    <div class="page-content max-w-4xl mx-auto py-20">

        <h1
            class="text-5xl font-bold mb-10"
            data-aos="fade-up"
        >
            Contact Us
        </h1>

        <div
            class="bg-white p-8 rounded-2xl shadow"
            data-aos="fade-up"
            data-aos-delay="200"
        >

            <p>
                Address:
                Your Resort Address
            </p>

            <p class="mt-4">
                Phone:
                09123456789
            </p>

            <p class="mt-4">
                Email:
                info@casatejada.com
            </p>

            <p class="mt-4">
                Facebook:
                Casa Tejada Resort
            </p>

        </div>

    </div>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

    <script>
        AOS.init({
            duration: 1000,
            once: true
        });
    </script>

    <script>
        const menuBtn =
            document.getElementById('menuBtn');

        const mobileMenu =
            document.getElementById('mobileMenu');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
    </script>

</body>

</html>
