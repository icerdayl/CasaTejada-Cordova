<script>
    document.querySelectorAll('.approveBtn').forEach(button=>{button.addEventListener('click',async()=>{const id =button.dataset.id;const response =await fetch('../api/approve_booking.html',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'id='+encodeURIComponent(id)});const data =await response.json();alert(data.message);location.reload();});});
    document.querySelectorAll('.rejectBtn').forEach(button=>{button.addEventListener('click',async()=>{const id =button.dataset.id;const response =await fetch('../api/reject_booking.html',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'id='+encodeURIComponent(id)});const data =await response.json();alert(data.message);location.reload();});});
    document.querySelectorAll('.deleteBtn').forEach(button=>{button.addEventListener('click',async()=>{if(!confirm('Delete booking?')){return;}const id =button.dataset.id;const response =await fetch('../api/delete_booking.html',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'id='+encodeURIComponent(id)});const data =await response.json();alert(data.message);location.reload();});});
</script>
